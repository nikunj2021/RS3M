name: Weekly NSE Market Report

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST every Saturday
    - cron: '30 3 * * 6'
  workflow_dispatch:

# Force the runner to use Node.js 24 for all actions in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # This will now run on Node 24 due to the env var

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance pandas xlsxwriter

    - name: Run Market Scripts
      run: |
        mkdir -p Report/RSReport
        python RS-NIFTY504W.py
        python RS-NIFTY2504W.py
        python RS-NIFTY5004W.py

    - name: Update Timestamp in HTML
      run: |
        # Calculate IST (UTC + 5:30)
        export CURRENT_TIME=$(date -u -d "+5 hours 30 minutes" +"%Y-%m-%d %H:%M IST")
        sed -i "s/LAST_UPDATED (UTC)/$CURRENT_TIME/g" index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
