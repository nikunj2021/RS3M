name: Weekly NSE Market Report

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST every Saturday
    - cron: '30 3 * * 6'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to gh-pages branch

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance pandas xlsxwriter

    - name: Run Market Scripts
      run: |
        mkdir -p Report/RSReport
        python RS-NIFTY504W.py
        python RS-NIFTY2504W.py
        python RS-NIFTY5004W.py

    - name: Update Timestamp in HTML
      run: |
        # Replaces the placeholder in your HTML with current IST time
        export CURRENT_TIME=$(date -u -d "+5 hours 30 minutes" +"%Y-%m-%d %H:%M IST")
        sed -i "s/LAST_UPDATED (UTC)/$CURRENT_TIME/g" index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
